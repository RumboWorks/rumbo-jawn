<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RumboWorks — Sounds Like Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<style>
  html, body, #root { margin: 0; height: 100%; }
  body { background: var(--rj-paper); color: var(--rj-ink); font-family: var(--rj-font-sans); -webkit-font-smoothing: antialiased; overflow: hidden; }

  @keyframes slu-spin { to { transform: rotate(360deg); } }

  .slu-navlabel { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--rj-stone-400); padding: 0 12px 6px; }
  .slu-navitem:hover { background: var(--rj-stone-100) !important; }

  .slu-iconbtn { background: transparent; border: none; cursor: pointer; padding: 7px; border-radius: 8px; display: inline-flex; }
  .slu-iconbtn:hover { background: var(--rj-stone-100); }

  .slu-orgswitch { display: inline-flex; align-items: center; gap: 8px; background: var(--rj-white); border: 1px solid var(--rj-border); border-radius: 8px; padding: 6px 11px; font-size: 13px; font-weight: 600; color: var(--rj-stone-700); cursor: pointer; }
  .slu-orgswitch:hover { border-color: var(--rj-stone-400); }

  .slu-menuitem { display: block; width: 100%; text-align: left; padding: 8px 10px; border: none; background: transparent; font-size: 13.5px; color: var(--rj-stone-700); border-radius: 6px; cursor: pointer; font-family: var(--rj-font-sans); }
  .slu-menuitem:hover { background: var(--rj-stone-100); }

  /* Checkboxes */
  .slu-check { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border: 1px solid var(--rj-border); border-radius: 8px; font-size: 14px; color: var(--rj-stone-700); cursor: pointer; user-select: none; transition: border-color .15s, background .15s; }
  .slu-check[data-on="true"] { border-color: var(--rj-pine-300); background: var(--rj-pine-50); }
  .slu-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--rj-stone-300); display: inline-flex; align-items: center; justify-content: center; flex: none; }
  .slu-checkbox[data-on="true"] { background: var(--rj-pine-600); border-color: var(--rj-pine-600); }

  /* Range slider */
  .slu-range { -webkit-appearance: none; width: 100%; height: 5px; border-radius: 99px; background: var(--rj-stone-200); outline: none; }
  .slu-range::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--rj-ember-500); cursor: pointer; border: 2px solid #fff; box-shadow: var(--rj-shadow-sm); }
  .slu-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--rj-ember-500); cursor: pointer; border: 2px solid #fff; }

  /* Switch */
  .slu-row-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 2px; font-size: 14px; color: var(--rj-stone-700); cursor: pointer; border-bottom: 1px solid var(--rj-border); }
  .slu-switch { width: 38px; height: 22px; border-radius: 99px; background: var(--rj-stone-300); position: relative; transition: background .18s var(--rj-ease); flex: none; }
  .slu-switch[data-on="true"] { background: var(--rj-pine-600); }
  .slu-knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform .18s var(--rj-ease); box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .slu-switch[data-on="true"] .slu-knob { transform: translateX(16px); }

  .slu-panel-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--rj-stone-500); margin-bottom: 10px; }

  /* Segmented variant buttons */
  .slu-seg { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; padding: 9px 11px; border: 1px solid var(--rj-border); border-radius: 8px; background: var(--rj-white); font-size: 13.5px; font-weight: 600; color: var(--rj-stone-700); cursor: pointer; font-family: var(--rj-font-sans); transition: border-color .15s, background .15s; }
  .slu-seg[data-on="true"] { border-color: var(--rj-ember-400); background: var(--rj-ember-50); color: var(--rj-ember-700); }

  .slu-pill { flex: 1; padding: 7px 10px; border: 1px solid var(--rj-border); background: var(--rj-white); border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--rj-stone-600); cursor: pointer; font-family: var(--rj-font-sans); }
  .slu-pill[data-on="true"] { border-color: var(--rj-pine-500); background: var(--rj-pine-50); color: var(--rj-pine-700); }

  /* Admin tabs */
  .slu-tab { padding: 10px 14px; border: none; background: transparent; font-size: 14px; font-weight: 600; color: var(--rj-stone-500); cursor: pointer; font-family: var(--rj-font-sans); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .slu-tab[data-on="true"] { color: var(--rj-pine-700); border-bottom-color: var(--rj-ember-500); }
  .slu-tab:hover { color: var(--rj-stone-700); }
</style>
</head>
<body class="rj-root">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="Brand.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Auth.jsx"></script>
<script type="text/babel" src="SluFlow.jsx"></script>
<script type="text/babel" src="Workbench.jsx"></script>
<script type="text/babel" src="Admin.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>
