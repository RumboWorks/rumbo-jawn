<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elevation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>html,body{margin:0}body{background:var(--rj-paper);font-family:var(--rj-font-sans);color:var(--rj-ink)}.card{padding:22px 24px}</style>
</head><body class="rj-root"><div class="card">
<div class="rj-eyebrow" style="margin-bottom:18px">Elevation · warm-tinted shadows</div>
<div style="display:flex;gap:18px;align-items:center;padding:6px 4px 14px">
<div style="flex:1;text-align:center">
  <div style="height:64px;background:var(--rj-white);border-radius:10px;box-shadow:var(--rj-shadow-xs)"></div>
  <div style="font-family:var(--rj-font-mono);font-size:11px;color:var(--rj-fg-2);margin-top:13px">xs</div>
  <div style="font-size:10px;color:var(--rj-fg-3);margin-top:2px">hairline lift</div>
</div><div style="flex:1;text-align:center">
  <div style="height:64px;background:var(--rj-white);border-radius:10px;box-shadow:var(--rj-shadow-sm)"></div>
  <div style="font-family:var(--rj-font-mono);font-size:11px;color:var(--rj-fg-2);margin-top:13px">sm</div>
  <div style="font-size:10px;color:var(--rj-fg-3);margin-top:2px">cards</div>
</div><div style="flex:1;text-align:center">
  <div style="height:64px;background:var(--rj-white);border-radius:10px;box-shadow:var(--rj-shadow-md)"></div>
  <div style="font-family:var(--rj-font-mono);font-size:11px;color:var(--rj-fg-2);margin-top:13px">md</div>
  <div style="font-size:10px;color:var(--rj-fg-3);margin-top:2px">dropdowns</div>
</div><div style="flex:1;text-align:center">
  <div style="height:64px;background:var(--rj-white);border-radius:10px;box-shadow:var(--rj-shadow-lg)"></div>
  <div style="font-family:var(--rj-font-mono);font-size:11px;color:var(--rj-fg-2);margin-top:13px">lg</div>
  <div style="font-size:10px;color:var(--rj-fg-3);margin-top:2px">popovers</div>
</div><div style="flex:1;text-align:center">
  <div style="height:64px;background:var(--rj-white);border-radius:10px;box-shadow:var(--rj-shadow-xl)"></div>
  <div style="font-family:var(--rj-font-mono);font-size:11px;color:var(--rj-fg-2);margin-top:13px">xl</div>
  <div style="font-size:10px;color:var(--rj-fg-3);margin-top:2px">modals</div>
</div>
</div>
<div class="rj-caption" style="margin-top:4px">Shadows use warm ink (rgba 30,42,36) — never neutral black — so elevation stays in the paper world.</div>
</div></body></html>
