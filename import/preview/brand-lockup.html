<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
html,body{margin:0}
body{background:var(--rj-paper);font-family:var(--rj-font-sans);color:var(--rj-ink)}
.card{padding:22px 24px}
.swatches{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--rj-border)}
.sw{flex:1;height:74px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px}
.sw span{font-family:var(--rj-font-mono);font-size:10px;font-weight:600}
.lbl{display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--rj-fg-3);font-family:var(--rj-font-mono)}
.lbl b{color:var(--rj-fg-2);font-weight:600}

</style></head><body class="rj-root"><div class="card">
<div class="rj-eyebrow" style="margin-bottom:14px">Tool & product lockups</div>
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="background:var(--rj-white);border:1px solid var(--rj-border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:11px">
    <img src="../assets/rumboworks-mark.svg" width="34" height="34" alt="">
    <span class="rj-wordmark" style="font-size:22px">RumboWorks</span>
    <span class="rj-tool-tag" style="font-size:14px">Sounds Like Us</span>
  </div>
  <div style="background:var(--rj-white);border:1px solid var(--rj-border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:11px">
    <img src="../assets/rumboworks-mark.svg" width="34" height="34" alt="">
    <span class="rj-wordmark" style="font-size:22px">RumboWorks</span>
    <span class="rj-tool-tag" style="font-size:14px">Model&nbsp;Eval</span>
    <span class="rj-badge rj-badge--neutral" style="margin-left:2px">Planned</span>
  </div>
</div>
<div class="rj-caption" style="margin-top:16px;line-height:1.5">
  Always write <b style="color:var(--rj-fg-2)">RumboWorks</b> as one word. Tools are named in full
  (<b style="color:var(--rj-fg-2)">Sounds Like Us</b>) and separated from the wordmark by a hairline rule.
  Clearspace around the lockup = the height of the bearing mark on all sides.
</div>
</div></body></html>
