<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
html,body{margin:0}
body{background:var(--rj-paper);font-family:var(--rj-font-sans);color:var(--rj-ink)}
.card{padding:22px 24px}
.swatches{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--rj-border)}
.sw{flex:1;height:74px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px}
.sw span{font-family:var(--rj-font-mono);font-size:10px;font-weight:600}
.lbl{display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--rj-fg-3);font-family:var(--rj-font-mono)}
.lbl b{color:var(--rj-fg-2);font-weight:600}

</style></head><body class="rj-root"><div class="card">
<div style="display:flex;gap:26px;align-items:stretch">
  <div style="flex:1;background:var(--rj-white);border:1px solid var(--rj-border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:26px 10px">
    <div class="rj-logo">
      <img src="../assets/rumboworks-mark.svg" width="42" height="42" alt="">
      <span class="rj-wordmark" style="font-size:27px">RumboWorks</span>
    </div>
    <div class="rj-caption" style="font-size:11px">Primary lockup · light</div>
  </div>
  <div style="flex:1;background:var(--rj-pine-800);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:26px 10px">
    <div class="rj-logo">
      <img src="../assets/rumboworks-mark-light.svg" width="42" height="42" alt="">
      <span class="rj-wordmark rj-wordmark--light" style="font-size:27px">RumboWorks</span>
    </div>
    <div class="rj-caption" style="font-size:11px;color:var(--rj-pine-200)">Primary lockup · dark</div>
  </div>
</div>
<div style="display:flex;gap:20px;align-items:center;margin-top:20px">
  <div style="display:flex;align-items:center;gap:14px;flex:none">
    <img src="../assets/rumboworks-mark.svg" width="60" height="60" alt="">
    <img src="../assets/rumboworks-mark.svg" width="34" height="34" alt="">
    <img src="../assets/rumboworks-mark.svg" width="22" height="22" alt="">
  </div>
  <div class="rj-body-sm" style="line-height:1.5">The <b style="color:var(--rj-pine-700)">compass star</b> — a guiding north star for keeping AI on course. The ember north point marks the forward bearing; ochre rose-rays and an off-axis waypoint give it motion and warmth. Reads cleanly from 60px down to 22px.</div>
</div>
</div></body></html>
