<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inputs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>html,body{margin:0}body{background:var(--rj-paper);font-family:var(--rj-font-sans);color:var(--rj-ink)}.card{padding:22px 24px}.row{display:flex;gap:11px;align-items:center;flex-wrap:wrap}</style>
</head><body class="rj-root"><div class="card">
<div class="rj-eyebrow" style="margin-bottom:14px">Form controls</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div class="rj-field">
    <label class="rj-label">Public URL</label>
    <input class="rj-input" value="https://example.org/about" />
    <span class="rj-hint">We only read public pages.</span>
  </div>
  <div class="rj-field">
    <label class="rj-label">Analysis depth</label>
    <select class="rj-select"><option>Single page</option><option>Page + linked sections</option></select>
    <span class="rj-hint">Affects time & cost.</span>
  </div>
  <div class="rj-field" style="grid-column:1/3">
    <label class="rj-label">Notes</label>
    <textarea class="rj-textarea" rows="2" placeholder="Optional context for the analysis…"></textarea>
  </div>
</div>
<script>lucide.createIcons();</script></div></body></html>
